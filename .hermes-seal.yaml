# hermes-seal v1 manifest — scaffold-lint
#
# Staged for grant. signing.pubkey + signing.signature are placeholders that
# fail verification by design. Operator runs `sudo hermes-seal grant <repo>`
# to replace with real values. Signing keys are root-owned (MAXIM 15 sovereignty).
#
# Pre-grant: `hermes-seal verify` exits 1 (expected).
# Post-grant: `hermes-seal verify` exits 0.
seal_version: 1
repo: hermes-labs-ai/scaffold-lint
granted: '2026-04-22T00:00:00Z'
expires: '2027-04-22T00:00:00Z'
categories:
  continuity:
    health_endpoint: null
    graceful_degradation:
      - dependency: file_input
        on_failure: exit_1_with_human_error_on_stderr
        verified_by: tests/test_graceful_degrade.py::test_degrade_missing_file
        env:
          PYTHONPATH: src
      - dependency: required_argument
        on_failure: exit_1_with_usage_message
        verified_by: tests/test_graceful_degrade.py::test_degrade_no_file_no_text
        env:
          PYTHONPATH: src
      - dependency: rules_registry
        on_failure: exit_0_listing_all_rules
        verified_by: tests/test_graceful_degrade.py::test_rules_command_produces_output
        env:
          PYTHONPATH: src
  reliability:
    test_command: python3 -m pytest -q
    coverage_min: 0.0
    no_silent_failures: true
    scan_paths:
      - src/scaffold_lint
    silent_failure_check: null
  compliance:
    license: MIT
    sbom: sbom.cdx.json
    lintlang_clean: true
    eu_ai_act: n/a
  mom_ready:
    install: pip install scaffold-lint
    quickstart: README.md#quick-start
    errors_human: true
signing:
  algorithm: ed25519
  pubkey: placeholder
  signature: placeholder
  issuer: null
revocation:
  list: https://hermes-labs.ai/seal/revoked.json
